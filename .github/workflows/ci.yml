name: CI

on:
  push:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install backend deps
        run: |
          cd backend
          npm install

      - name: Run backend lint
        run: |
          cd backend
          npx eslint .

      - name: Install frontend deps
        run: |
          cd frontend
          npm install

      - name: Run frontend lint
        run: |
          cd frontend
          npx eslint .